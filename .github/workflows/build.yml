name: Build WildCommons

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Fix gradlew permissions
        run: chmod +x gradlew

      - name: Build project
        run: ./gradlew build

      - name: Upload WildCommons-Core
        uses: actions/upload-artifact@v4
        with:
          name: WildCommons-Core
          path: WildCommons-Core/build/libs/*.jar

      - name: Upload WildCommons-Plugin
        uses: actions/upload-artifact@v4
        with:
          name: WildCommons-Plugin
          path: WildCommons-Plugin/build/libs/*.jar